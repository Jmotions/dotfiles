# ~/.config/wal/templates/vicinae.toml
# Pywal template for Vicinae (v2 - Detailed Structure)

[meta]
version = 1
name = "Pywal"
description = "A theme dynamically generated by Pywal from your wallpaper."
# Pywal doesn't export a light/dark variable, so we assume dark.
# You can manually change this to "light" if pywal generates a light theme.
variant = "dark"

[colors.core]
background = "{background}"
foreground = "{foreground}"
secondary_background = "{color8}" # Dim black as a secondary surface
border = "{color8}"
accent = "{color4}" # A common choice for a primary accent

[colors.accents]
blue = "{color4}"
green = "{color2}"
magenta = "{color5}"
orange = "{color3}"
purple = "{color5}"
red = "{color1}"
yellow = "{color3}"
cyan = "{color6}"

# You can fine-tune these for better visibility
[colors.list.item.selection]
background = "{color8}"
secondary_background = "{color0}"

[colors.list.item.hover]
background = "{color0}"