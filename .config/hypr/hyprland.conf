source = ~/.cache/wal/colors-hyprland.conf

################
### MONITORS ###
################
monitor = DP-3, 1920x1080@180, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 0x-1080, 1
workspace = 1, monitor:DP-3
workspace = 2, monitor:HDMI-A-1

###################
### MY PROGRAMS ###
###################
$terminal      = kitty
$fileManager   = nautilus
$menu          = vicinae toggle #kitty --title launcher -e bash -c "fsel --systemd-run -vv"
$clipboard     = kitty --title launcher -e bash -i -c "fsel --cclip"
$browser       = ~/Desktop/zen/zen
$wallset       = kitty --class=wallset -e bash -i -c "~/wallpapertest.sh"
$screenshot    = bash -c 'mkdir -p /home/jahmad/Pictures/screenshots && ts=$(date +%Y-%m-%d_%H-%M-%S) && fp="/home/jahmad/Pictures/screenshots/screenshot-$ts.png" && grim -g "$(slurp)" "$fp" && swappy -f "$fp"'
$gemini        = kitty -e bash -i -c "./home/jahmad/gemini/gemini.sh"
$taildrop      = ~/bin/taildrop-rofi
$encfs_menu    = kitty --title encfs-manager -e /home/jahmad/bin/encfs_tui.sh
$spotify       = pgrep spotify_player && hyprctl dispatch togglespecialworkspace spotify || spotify_player & #kitty -e bash -i -c "spotify_player" #/home/jahmad/bin/spotify-wrapper.sh
$spotifyrun    = kitty -e bash -i -c "spotify_player"
$server        = kitty -e bash -i -c "~/cloudssh.sh"
$discord       = discord
#################
### AUTOSTART ###
#################
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = waybar & ./.config/wallset-engine/wallpaper_startup.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = sunshine
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
#exec-once = tailscale up
exec-once = cclipd -s 2 -t "image/png" -t "image/*" -t "text/plain;charset=utf-8" -t "text/*" -t "*" &
exec-once = kitty --single-instance -o allow_remote_control=yes --listen-on unix:/tmp/mykitty.socket --start-as=hidden
exec-once = kitten @ --to unix:/tmp/mykitty.socket launch --type=background ~/cclipd.sh
exec-once = swaync
exec-once = swww-daemon
exec-once = hyprpm reload 
exec-once = spotify_player -d
exec-once = $discord
exec-once = vicinae server
exec-once = deezer-desktop --start-in-tray &
exec-once = adb connect 100.95.79.16:39507
exec-once = adb connect 192.168.0.169:39507
exec-once = ~/androidmic/audiosource run
exec-once = musicpresence
############################
### ENVIRONMENT VARIABLES ###
#############################
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24  
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,qt5ct
env = HYPR_ENABLE_HYPRCURSOR,1

###################
### LOOK AND FEEL ###
###################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 3
    resize_on_border = false
    allow_tearing = false
    col.active_border   = $color3 $color2 $color10 45deg
    col.inactive_border = $background $color2 45deg
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 16
        passes = 4
        xray = true
        vibrancy = 0.1696
        new_optimizations = true
        ignore_opacity = true
    }
}

plugin:dynamic-cursors {

    # enables the plugin
    enabled = true

    # sets the cursor behaviour, supports these values:
    # tilt    - tilt the cursor based on x-velocity
    # rotate  - rotate the cursor based on movement direction
    # stretch - stretch the cursor shape based on direction and velocity
    # none    - do not change the cursors behaviour
    mode = stretch

    # minimum angle difference in degrees after which the shape is changed
    # smaller values are smoother, but more expensive for hw cursors
    threshold = 2

    # override the mode behaviour per shape
    # this is a keyword and can be repeated many times
    # by default, there are no rules added
    # see the dedicated `shape rules` section below!
   # shaperule = <shape-name>, <mode> (optional), <property>: <value>, ...
   # shaperule = <shape-name>, <mode> (optional), <property>: <value>, ...
   # ...

    # for mode = rotate
    rotate {

        # length in px of the simulated stick used to rotate the cursor
        # most realistic if this is your actual cursor size
        length = 20

        # clockwise offset applied to the angle in degrees
        # this will apply to ALL shapes
        offset = 0.0
    }

    # for mode = tilt
    tilt {

        # controls how powerful the tilt is, the lower, the more power
        # this value controls at which speed (px/s) the full tilt is reached
        # the full tilt being 60° in both directions
        limit = 5000

        # relationship between speed and tilt, supports these values:
        # linear             - a linear function is used
        # quadratic          - a quadratic function is used (most realistic to actual air drag)
        # negative_quadratic - negative version of the quadratic one, feels more aggressive
        # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
        function = negative_quadratic

        # time window (ms) over which the speed is calculated
        # higher values will make slow motions smoother but more delayed
        window = 100
    }

    # for mode = stretch
    stretch {

        # controls how much the cursor is stretched
        # this value controls at which speed (px/s) the full stretch is reached
        # the full stretch being twice the original length
        limit = 1500

        # relationship between speed and stretch amount, supports these values:
        # linear             - a linear function is used
        # quadratic          - a quadratic function is used
        # negative_quadratic - negative version of the quadratic one, feels more aggressive
        # see `activation` in `src/mode/utils.cpp` for how exactly the calculation is done
        function = linear

        # time window (ms) over which the speed is calculated
        # higher values will make slow motions smoother but more delayed
        window = 150
    }

    # configure shake to find
    # magnifies the cursor if its is being shaken
    shake {

        # enables shake to find
        enabled = true

        # use nearest-neighbour (pixelated) scaling when shaking
        # may look weird when effects are enabled
        nearest = false

        # controls how soon a shake is detected
        # lower values mean sooner
        threshold = 6.0

        # magnification level immediately after shake start
        base = 4.0
        # magnification increase per second when continuing to shake
        speed = 4.0
        # how much the speed is influenced by the current shake intensitiy
        influence = 0.0

        # maximal magnification the cursor can reach
        # values below 1 disable the limit (e.g. 0)
        limit = 0.0

        # time in millseconds the cursor will stay magnified after a shake has ended
        timeout = 2000

        # show cursor behaviour `tilt`, `rotate`, etc. while shaking
        effects = false

        # enable ipc events for shake
        # see the `ipc` section below
        ipc = false
    }

    # use hyprcursor to get a higher resolution texture when the cursor is magnified
    # see the `hyprcursor` section below
    hyprcursor {

        # use nearest-neighbour (pixelated) scaling when magnifing beyond texture size
        # this will also have effect without hyprcursor support being enabled
        # 0 / false - never use pixelated scaling
        # 1 / true  - use pixelated when no highres image
        # 2         - always use pixleated scaling
        nearest = true

        # enable dedicated hyprcursor support
        enabled = true

        # resolution in pixels to load the magnified shapes at
        # be warned that loading a very high-resolution image will take a long time and might impact memory consumption
        # -1 means we use [normal cursor size] * [shake:base option]
        resolution = -1

        # shape to use when clientside cursors are being magnified
        # see the shape-name property of shape rules for possible names
        # specifying clientside will use the actual shape, but will be pixelated
        fallback = clientside
    }
}

$iopacity = 0.94
$oopacity = 0.76

##################################
### WINDOW RULES & LAYER RULES ###
##################################
# Scrcpy
windowrule = match:class ^scrcpy$, float on
windowrule = match:class ^scrcpy$, size 420 900
windowrule = match:class ^scrcpy$, move (monitor_w-430) 40
#windowrule = match:class ^scrcpy$, workspace special:phone silent

# AndroidMic
#windowrule = workspace special silent,title:^(AndroidMic)$
#windowrule = nofocus,title:^(AndroidMic)$
#windowrule = workspace special silent, title:^AndroidMic$
#windowrule = nofocus, title:^AndroidMic$
# Overlayed
windowrule = match:class ^(overlayed)$, float 1, pin 1


# Launcher
windowrule = float on, match:title ^(launcher)$
windowrule = center on, match:title ^(launcher)$
windowrule = size (monitor_w*0.42) (monitor_h*0.55), match:title ^(launcher)$
windowrule = opacity $iopacity $oopacity, match:title ^(launcher)$

# Encfs Manager
windowrule = float on, match:title ^(encfs-manager)$
windowrule = center on, match:title ^(encfs-manager)$
windowrule = size (monitor_w*0.42) (monitor_h*0.55), match:title ^(encfs-manager)$
windowrule = opacity $iopacity $oopacity, match:title ^(encfs-manager)$

# Wallset
windowrule = float on, match:class ^(wallset)$
windowrule = center on, match:class ^(wallset)$
windowrule = size 1336 564, match:class ^(wallset)$
windowrule = opacity $iopacity $oopacity, match:class ^(wallset)$

# CPMENU
windowrule = float on, match:class ^(cpmenu)$
windowrule = center on, match:class ^(cpmenu)$
windowrule = size (monitor_w*0.42) (monitor_h*0.55), match:class ^(cpmenu)$
windowrule = opacity $iopacity $oopacity, match:class ^(cpmenu)$
windowrule = animation popin, match:class ^(cpmenu)$

# Hyprpm / modals
windowrule = float on, match:class ^(hyprpm)$
windowrule = float on, match:modal true

# Spotify
windowrule = opacity 0.8, match:class ^(Spotify)$
windowrule = float on, match:class ^(spotify_player)$
windowrule = workspace special:spotify silent, match:class ^(spotify_player)$
windowrule = fullscreen on, match:class ^(spotify_player)$
# Discord / Vesktop translucency
windowrule = opacity 0.92 0.92, match:class ^(discord)$
windowrule = opacity 0.92 0.92, match:class ^(vesktop)$

#windowrule = noborder, match:class ^(discord)$
#windowrule = noborder, match:class ^(vesktop)$

# Dropdown Terminal
windowrule = float on, match:class ^(kitty-dropdown)$
windowrule = size (monitor_w*0.35) (monitor_h*0.4), match:class ^(kitty-dropdown)$
windowrule = move 30 50, match:class ^(kitty-dropdown)$

# -----------------
# Layer rules
# -----------------
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.1, match:namespace swaync-control-center

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.1, match:namespace swaync-notification-window

layerrule = blur on, match:namespace vicinae





###################
### ANIMATIONS ###
###################
animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = overshoot, 0.05, 0.9, 0.1, 1.1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = specialWorkspace, 1, 5, easeOutQuint, slidevert
}

###################
### TILE LAYOUTS ###
###################
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

###################
### MISC SETTINGS ###
###################
misc {
    vrr = 1 # 1: Always, 2: Fullscreen only
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

$mainMod = SUPER

###################
### KEYBINDINGS ###
###################
# Launchers
bind = $mainMod, Q, killactive
bind = $mainMod CTRL, Q, exec, hyprlock
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, A, exec, $menu
bind = $mainMod SHIFT, A, exec, $clipboard
bind = $mainMod SHIFT, E, exec, $encfs_menu
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, W, exec, $wallset
bind = $mainMod, H, exec, $spotify
bind = $mainMod SHIFT, H, exec, $spotifyrun
bind = $mainMod SHIFT, T, exec, $server
bind = $mainMod, P, exec, $screenshot
bind = $mainMod SHIFT, C, exec, vicinae vicinae://extensions/vicinae/clipboard/history
bind = $mainMod SHIFT, L, exec, vicinae vicinae://extensions/mattisssa/spotify-player/findLyrics
bind = $mainMod, K, exec, vicinae vicinae://extensions/sovereign/hypr-keybinds/hyprland-keybinds
bind = $mainMod, U, exec, playerctl --player=spotify_player previous
bind = $mainMod, I, exec, playerctl --player=spotify_player play-pause
bind = $mainMod, O, exec, playerctl --player=spotify_player next
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, Y, exec, killall -SIGUSR2 waybar
bind = $mainMod SHIFT, Y, exec, pkill -SIGUSR1 waybar || waybar 
bind = $mainMod, I, exec, vicinae vicinae://extensions/rithvikvibhu/arch-packages/search-arch-packages
# Window Management
bind = $mainMod, F, fullscreen
bind = $mainMod, W, togglefloating,
bind = $mainMod, J, togglesplit,
bind = $mainMod, L, focuswindow, title:^(Picture in picture)$

# Workspace Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/Resize with Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Alt-Tab Overview
bind = Alt_L, Tab, exec, hyprctl reload
#bind = Alt_L, Tab, exec, hyprctl dispatch overview:toggle


#layerrule = ignoreexclusive true, match:namespace hyprspace


